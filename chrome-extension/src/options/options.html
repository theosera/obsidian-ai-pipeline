<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Transcript Analyzer - 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>YouTube Transcript Analyzer</h1>
    <p class="subtitle">Obsidian AI Pipeline 拡張設定</p>

    <form id="options-form">
      <section class="section">
        <h2>API設定</h2>
        <div class="field">
          <label for="api-key">Anthropic API Key</label>
          <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
          <p class="hint">APIキーは端末内のローカルストレージに保存されます。</p>
        </div>
      </section>

      <section class="section">
        <h2>モデル設定</h2>
        <div class="field">
          <label>
            <input type="checkbox" id="auto-select-model" checked>
            自動モデル選択（推奨）
          </label>
          <p class="hint">短い動画にはFast (Haiku)、長い動画にはSmart (Sonnet) を自動で使い分けます。</p>
        </div>
        <div class="field">
          <label for="fast-model">Fast モデル</label>
          <select id="fast-model">
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
          </select>
        </div>
        <div class="field">
          <label for="smart-model">Smart モデル</label>
          <select id="smart-model">
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-opus-4-6">Claude Opus 4.6</option>
          </select>
        </div>
      </section>

      <section class="section">
        <h2>出力設定</h2>
        <div class="field">
          <label>
            <input type="checkbox" id="include-raw-transcript" checked>
            生トランスクリプトをマークダウンに含める（折りたたみ）
          </label>
        </div>
      </section>

      <div class="actions">
        <button type="submit" id="save-btn">保存</button>
        <span id="save-status" class="status" role="status" aria-live="polite"></span>
      </div>
    </form>
  </div>

  <script type="module" src="options.ts"></script>
</body>
</html>
