name: CI

on:
  pull_request:
  push:
    branches: [main]

# GITHUB_TOKEN は read-only に制限（least privilege）
permissions:
  contents: read

# 同一PR/ブランチで連続push時に古いジョブをキャンセルする。
# ただし main では常に最後まで走らせる（merge commit ごとの緑/赤履歴を確実に残すため）。
# 例: 短時間に連続 merge すると 1 本目の run が 2 本目に cancel され、1 本目の
# 変更が main 上で検証されないまま残ってしまう事故を防ぐ。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pipeline:
    name: Pipeline (root) - test & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        # packageManager フィールド (pnpm@10.33.0) から自動検出

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Lint package.json files for duplicate keys
        # node/python accept duplicate JSON keys silently (last-wins). Catch
        # malformed manifests before they slip into main (see PR #23 post-mortem).
        run: python3 .github/scripts/check-package-json-duplicates.py

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native dependencies (better-sqlite3)
        # pnpm 10 はデフォルトでビルドスクリプトを無効化する。package.json の
        # pnpm.onlyBuiltDependencies で allowlist 済みだが、CI の pnpm store
        # キャッシュが設定追加前の状態を再利用するケースがあるため、確実に
        # native .node バイナリを生成するよう明示リビルドする。
        run: pnpm rebuild better-sqlite3

      - name: Run security tests (24 cases)
        run: pnpm test

      - name: TypeScript type check (root + workspace)
        # pnpm exec tsc --noEmit は root tsconfig しか見ず、packages/core
        # や apps/* の型崩れを検知できない。workspace 全体を走らせる。
        run: pnpm typecheck

  chrome-extension:
    name: Chrome extension - build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-extension
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: chrome-extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build (tsc --noEmit + vite build)
        run: pnpm --ignore-workspace run build
