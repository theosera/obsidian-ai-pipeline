packages:
  - apps/*
  - packages/*

# Shared dev-tool versions for Claude-side (root) + Codex-side (apps/*, packages/*).
# Reference via `"typescript": "catalog:"` etc. in any workspace package.json.
# Bump here once; every participant follows. Prevents the Claude-vs-Codex
# branch drift on TypeScript / tsx / @types/node.
catalog:
  typescript: ^5.7.0
  '@types/node': ^25.5.2
  tsx: ^4.21.0
